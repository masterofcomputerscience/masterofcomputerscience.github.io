<!DOCTYPE html>
<html>
<head>
  <title>IGCSE CS Resources</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #2d3e5e;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .workspace {
      background: white;
      min-height: 500px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);

      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    a {
      display: block;
      padding: 10px;
      background: #f1f5f9;
      border-radius: 6px;
      text-decoration: none;
      color: #0077cc;
    }

    a:hover {
      background: #e2e8f0;
    }

    .hint {
      font-size: 14px;
      color: gray;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>IGCSE Computer Science Resources</h1>
</header>

<div class="container">

  <p class="hint">
    📂 Drop all your files into this folder. Everything appears here automatically as links.
  </p>

  <div class="workspace">

    <a href="papers/igcse-cs/file1.pdf" target="_blank">file1.pdf</a>
    <a href="papers/igcse-cs/file2.pdf" target="_blank">file2.pdf</a>
    <a href="papers/igcse-cs/file3.pdf" target="_blank">file3.pdf</a>
    <a href="papers/igcse-cs/file4.pdf" target="_blank">file4.pdf</a>

  </div>

</div>

</html>
